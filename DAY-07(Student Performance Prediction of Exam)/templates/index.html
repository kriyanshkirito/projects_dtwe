<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Check</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
      <style>
   
    </style>
</head>
<body>
    
      <h1>Student Performance Prediction</h1>
        
        <form action="{{ url_for('predict') }}" method="post">
        
           <div id="dora"> 
            
            <input type="text" name="Hours Studied" placeholder="Hours Studied" required="required" /><br>
            <input type="text" name="Previous Scores" placeholder="Previous Scores" required="required" /><br>
             <select name="Gender">
                <option value="select">Extracurricular Activities</option>
                <!-- value =1 is the data that get sent to the server -->
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select><br>
         

            <input type="text" name="Sleep Hours" placeholder="Sleep Hours" required="required" /><br>
            <input type="text" name="Sample Question Papers Practiced" placeholder="Sample Question Papers Practiced" required="required" />
           </div>
            <button type="submit" class="btn btn">Predict</button>
            
        </form>
        <h1 id="pred">
            {{prediction_text}}

        </h1>


    

    
  <script>
    const { random, atan2, cos, sin, hypot } = Math;
const max = 200;
const canvas = document.createElement("canvas");
const $ = canvas.getContext('2d');
const body = document.body;
const particles = [];

body.style.backgroundColor = "black";
body.style.overflow = "hidden";
body.appendChild(canvas);

let width  = window.innerWidth;
let height  = window.innerHeight;
canvas.width=width;
canvas.height=height;
let point = {	x: width/2,	y: height/2 };
let hue = 0;

function Particle(){};

Particle.prototype = {
	init(){
		this.hue = hue;
		this.alpha = 0;
		this.size = this.random(1, 5);
		this.x = this.random(0, width);
		this.y = this.random(0, height);
		this.velocity = this.size * .5;
		this.changed = null;
		this.changedFrame = 0;
		this.maxChangedFrames = 50;
		return this;
	},
	draw(){
		$.strokeStyle = `hsla(${this.hue}, 100%, 50%, ${this.alpha})`;
		$.beginPath();
		$.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
		$.stroke();
		this.update();
	},
	update(){
		if(this.changed){
			this.alpha *= .92;
			this.size += 2;
			this.changedFrame++;
			if(this.changedFrame > this.maxChangedFrames){
				this.reset();
			}
		}	else if(this.distance(point.x, point.y) < 50){
			this.changed = true;
		}	else {
			let dx = point.x - this.x;
			let dy = point.y - this.y;
			let angle = atan2(dy, dx);
			
			this.alpha += .01;
			this.x += this.velocity * cos(angle);
			this.y += this.velocity * sin(angle);
			this.velocity += .02;
		}	
	},
	reset(){
		this.init();
	},
	distance(x, y){
		return hypot(x - this.x, y - this.y);	
	},
	random(min, max) {
  	return random() * (max - min) + min;
	}
}

function animate(){
	$.fillStyle = `rgba(0,0,0, .2)`;
	$.fillRect(0, 0, width, height);
	particles.forEach((p) => {
		p.draw();
	});
	hue += .3;
	window.requestAnimationFrame(animate);
}

function touches(e){
	point.x = e.touches ? e.touches[0].clientX : e.clientX;
	point.y = e.touches ? e.touches[0].clientY : e.clientY;
}

function setup(){
	for(let i=0; i<max; i++){
		setTimeout(() => {
			let p = new Particle().init();
			particles.push(p);
		}, i * 10);
	}
	
	canvas.addEventListener("mousemove", touches);
	canvas.addEventListener("touchmove", touches);
	canvas.addEventListener("mouseleave", () => {
		point = {	x: width/2,	y: height/2 };
	});
	window.addEventListener("resize", () => {
		width = canvas.width = window.innerWidth;
		height = canvas.height = window.innerHeight;
		point = {	x: width/2,	y: height/2 };
	});
	animate();
}

setup();
  </script>
    
</body>
</html>
